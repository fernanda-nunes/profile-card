<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" sizes="32x32" href="./src/imagens/favicon-32x32.png">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/variaveis.css">
    <link rel="stylesheet" href="./src/css/estilos.css">

    <title>Profile Card</title>

</head>
<body>
    <main class="container">
        <div class="card">

            <div class="perfil">
                <div class="foto">
                    <img src="./src/imagens/image-victor.jpg" alt="foto perfil">
                </div>
                

                <p>Victor Crest <span class="age">26</span></p>

                <span class="city">London</span>
            </div>

            <hr>

            <ul class="perfil-numeros">

                <li class="info">
                    <p class="numero">80K</p>
                    <span class="texto">Followers</span>
                </li>

                <li class="info">
                    <p class="numero">803K</p>
                    <span class="texto">Likes</span>
                </li>

                <li class="info">
                    <p class="numero">1.4K</p>
                    <span class="texto">Photos</span>
                </li>

            </ul>

        </div>
    </main>

</body>
</html>
